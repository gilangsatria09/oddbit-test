name: notes_app
description: "Notes app for oddbit test"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  dio: ^5.9.2
  get_it: ^9.2.1
  injectable: ^3.0.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  dartz: ^0.10.1
  logger: ^2.7.0
  dio_http_formatter: ^3.3.1
  bloc: ^9.2.0
  after_layout: ^1.2.0
  flutter_secure_storage: ^10.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^3.0.2
  build_runner: ^2.14.1
  json_serializable: ^6.13.1
  freezed: ^3.2.5
  flutter_gen_runner: ^5.10.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/png/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat/Montserrat-LightItalic.ttf
          style: italic
          weight: 300
        - asset: assets/fonts/Montserrat/Montserrat-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/Montserrat/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat/Montserrat-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Montserrat/Montserrat-Semibold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat/Montserrat-SemiboldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Montserrat/Montserrat-BoldItalic.ttf
          weight: 700
          style: italic
flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
    lottie: true
